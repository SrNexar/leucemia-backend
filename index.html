<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detección de Leucemia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
h1 { text-align: center; padding: 24px; font-size: 1.4rem; color: #f1f5f9; }
.container { max-width: 720px; margin: 0 auto; padding: 0 16px 40px; }
.dropzone {
  border: 2px dashed #475569; border-radius: 12px;
  padding: 48px 16px; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
}
.dropzone:hover, .dropzone.drag { border-color: #6366f1; background: #1e293b; }
.dropzone p { color: #94a3b8; font-size: .95rem; }
.dropzone .sub { font-size: .8rem; color: #64748b; margin-top: 6px; }
#fileInput { display: none; }
.preview { margin-top: 20px; text-align: center; }
.preview img { max-width: 300px; max-height: 300px; border-radius: 8px; border: 1px solid #334155; }
.result { margin-top: 20px; }
.card {
  background: #1e293b; border: 1px solid #334155; border-radius: 10px;
  padding: 20px; margin-bottom: 16px;
}
.card h3 { font-size: 1.1rem; margin-bottom: 10px; }
.badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-weight: 600; font-size: .85rem;
}
.badge-ALL { background: #991b1b; color: #fca5a5; }
.badge-AML { background: #854d0e; color: #fcd34d; }
.badge-CLL { background: #1e40af; color: #93c5fd; }
.badge-CML { background: #4c1d95; color: #c4b5fd; }
.badge-Normal { background: #166534; color: #86efac; }
.badge-Indeterminado { background: #334155; color: #94a3b8; }
.warning { background: #422006; border-color: #92400e; }
.confianza { font-size: 2rem; font-weight: 700; margin: 8px 0; }
.bars { margin-top: 12px; }
.bar-row { display: flex; align-items: center; margin-bottom: 6px; gap: 10px; }
.bar-label { width: 70px; text-align: right; font-size: .8rem; color: #94a3b8; flex-shrink: 0; }
.bar-track { flex: 1; height: 18px; background: #334155; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.bar-pct { width: 50px; font-size: .8rem; color: #cbd5e1; flex-shrink: 0; }
.f-ALL .bar-fill { background: linear-gradient(90deg, #dc2626,#f87171); }
.f-AML .bar-fill { background: linear-gradient(90deg, #d97706,#fbbf24); }
.f-CLL .bar-fill { background: linear-gradient(90deg, #2563eb,#60a5fa); }
.f-CML .bar-fill { background: linear-gradient(90deg, #7c3aed,#a78bfa); }
.f-Normal .bar-fill { background: linear-gradient(90deg, #16a34a,#4ade80); }
.ood-info { font-size: .8rem; color: #64748b; margin-top: 8px; }
.error { background: #450a0a; border-color: #dc2626; color: #fca5a5; padding: 12px; border-radius: 8px; margin-top: 16px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #475569; border-top-color: #6366f1; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 20px; color: #94a3b8; }
</style>
</head>
<body>

<h1>Detección de Leucemia</h1>

<div class="container">
  <div class="dropzone" id="dropzone">
    <p>Arrastrá una imagen o hacé clic para seleccionar</p>
    <p class="sub">Microscopía de células sanguíneas — PNG, JPG, BMP, TIFF</p>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="preview" id="preview" style="display:none"></div>
  <div class="result" id="result"></div>
</div>

<script>
const API = 'http://localhost:8000';
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const result = document.getElementById('result');
const CLASES = ['ALL','AML','CLL','CML','Normal'];

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) procesar(e.target.files[0]); });

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) procesar(file);
});

function procesar(file) {
  preview.style.display = 'block';
  preview.innerHTML = `<img src="${URL.createObjectURL(file)}" alt="preview">`;
  result.innerHTML = '<div class="loading"><span class="spinner"></span> Analizando...</div>';

  const form = new FormData();
  form.append('imagen', file);

  fetch(`${API}/predecir`, { method: 'POST', body: form })
    .then(r => r.json())
    .then(mostrarResultado)
    .catch(err => {
      result.innerHTML = `<div class="error">Error de conexión: ${err.message}<br><small>¿El servidor está corriendo en ${API}?</small></div>`;
    });
}

function mostrarResultado(data) {
  const adverso = data.advertencia;
  const clase = data.clase;
  const conf = data.confianza;
  const probs = data.probabilidades || {};
  const desc = data.descripcion || '';
  const motivo = data.motivo || '';
  const dist = data.distancia_ood || 0;

  let html = `<div class="card${adverso ? ' warning' : ''}">`;

  html += `<h3>${adverso ? 'Resultado' : 'Diagnóstico'}</h3>`;
  html += `<span class="badge badge-${clase}">${clase}</span>`;
  html += `<div class="confianza">${conf.toFixed(1)}%</div>`;
  html += `<p style="color:#94a3b8;font-size:.9rem">${desc}</p>`;

  if (motivo) {
    html += `<p class="ood-info">Motivo: ${motivo}</p>`;
  }
  if (dist > 0 && !adverso) {
    html += `<p class="ood-info">Distancia OOD: ${dist.toFixed(1)}</p>`;
  }

  html += `<div class="bars">`;
  for (const c of CLASES) {
    const pct = probs[c] || 0;
    html += `<div class="bar-row f-${c}">`;
    html += `<span class="bar-label">${c}</span>`;
    html += `<div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
    html += `<span class="bar-pct">${pct}%</span>`;
    html += `</div>`;
  }
  html += `</div></div>`;

  result.innerHTML = html;
}
</script>

</body>
</html>
